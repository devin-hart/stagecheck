# criteria-sets/seo.yaml
- id: title-length
  category: seo
  type: error
  check: snapshot.title.length <= 60
  message: "Meta title too long ({{snapshot.title.length}} chars)"

- id: og-image-present
  category: seo
  type: warning
  check: snapshot.metaTags.some(m => m.name === 'og:image')
  message: "Missing og:image tag"
