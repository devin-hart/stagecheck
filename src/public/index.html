<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StageCheck</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body>

<header>
  <h1>StageCheck</h1>
  <span>Staging page auditor</span>
</header>

<div class="container">
    <h1>StageCheck</h1>
    
    <div class="controls">
        <input type="text" id="urlInput" value="https://corporate.comcast.com/" placeholder="Enter URL...">
        <button id="runBtn" onclick="initDashboard()">Run audit</button>
    </div>
    
    <p id="status" class="status">Latest Audit: 4/28/2026</p>

    <div id="results" class="results-area">
        <div class="stats-grid">
            <div class="stat-card">
                <span id="numErrors" class="stat-value" style="color: #d70015;">0</span>
                <span class="stat-label">Errors</span>
            </div>
            <div class="stat-card">
                <span id="numWarnings" class="stat-value" style="color: #f56300;">0</span>
                <span class="stat-label">Warnings</span>
            </div>
            <div class="stat-card">
                <span id="numPassed" class="stat-value" style="color: #0071e3;">—</span>
                <span class="stat-label">Status</span>
            </div>
            <div class="stat-card">
                <span id="numTotal" class="stat-value">0</span>
                <span class="stat-label">Total Checks</span>
            </div>
        </div>

        <div id="filters" class="filters"></div>
        <div id="issuesList"></div>
    </div>
</div>
<script src="js/main.js"></script>

</body>
</html>
